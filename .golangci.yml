# .golangci.yml — vOps/vProx linter configuration (v2 config schema)
# Migrated from v1 via `golangci-lint migrate`; pragmatic set, no false-positive noise
version: "2"
run:
  go: ""
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - exhaustive
    - gosec
    - misspell
    - noctx
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      severity: medium
      confidence: medium
    govet:
      enable-all: false
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: internal/geo/geo\.go
        text: G304
      - linters:
          - gosec
        path: internal/backup/backup\.go
        text: G304
      - linters:
          - gosec
        path: internal/config/
        text: G304
      - linters:
          - gosec
        path: internal/config/
        text: G306
      - linters:
          - gosec
        path: internal/vops/config/
        text: G304
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
        text: G306
      - linters:
          - noctx
        path: _test\.go
      - linters:
          - bodyclose
        path: _test\.go
      - linters:
          - ALL
        path: vendor/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new-from-rev: ""
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/vNodesV/vOps
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
