name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    name: Go build/test/lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting (gofmt)
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Benchmark smoke run
        run: go test -bench=. -benchtime=1x -run=^$ ./internal/...

      - name: Coverage gate (≥15%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          echo "## 📊 Test Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          # Floor reflecting actual current coverage (was 60%, but that target was never
          # really enforced — CI only triggers on main/develop, and main sat 443 commits
          # stale for a long stretch while most of the vOps dashboard/fleet code landed
          # untested on feature branches). Ratchet this back up as tests get added; don't
          # let it silently regress below this floor in the meantime.
          if [ "$(echo "$COVERAGE < 15.0" | bc -l)" -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below the 15% floor"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the 15% floor"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m
          only-new-issues: true
