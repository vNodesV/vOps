# =============================
# Example Apache vhost for serving vOps under a sub-path of an existing site.
# Replace example.com / example.org and the admin IPs below with your own.
# File: /etc/apache2/sites-available/web2.conf
#
# Review fixes applied during development:
#   [FIX-1] Added RewriteRule for bare /vlog → /vlog/ redirect (was missing; hit WordPress)
#   [FIX-2] Removed dead <Location /assets> block (Options/AllowOverride invalid in Location)
#   [FIX-3] Added CacheDisable to /vlog/ block (prevents mod_cache caching proxy responses)
#   [FIX-4] Removed stale commented-out /vlog/ block (cleanup)
#   [FIX-5] Deduplicated SSLCertificate directives (moved to top, removed bottom duplicate)
#   [NOTE]  ProxyPreserveHost + X-Forwarded-Prefix already correct (keep as-is)
#   [NOTE]  mod_cache CacheEnable disk / in mods-available/cache.conf caches EVERYTHING
#           incl. /vops/ proxy — CacheDisable On added to <Location /vops/> (see FIX-3/FIX-7).
#   [NOTE]  log.conf also defines ServerName example.com — ensure ONLY web2.conf is enabled:
#           sudo a2dissite log && sudo a2ensite web2 && sudo systemctl reload apache2
#   [FIX-6] Added explicit ws:// WebSocket Location blocks for /vops/api/v1/fleet/vmshell
#           and /vops/api/v1/vm/shell — mod_proxy_wstunnel requires explicit ws:// ProxyPass;
#           the generic http:// ProxyPass in <Location /vops/> does not handle WS Upgrade.
#           H2Upgrade off prevents HTTP/2 from intercepting the WebSocket handshake.
#   [FIX-7] Agentic-eval review (2026-05-06): three blockers resolved —
#           B-1: CacheDisable On added to <Location /vops/> (was documented but absent — security hole).
#           B-2: Dead <Proxy 'https://example.com/vops/?'> block removed; ProxyPreserveHost On and
#                flushpackets moved directly into <Location /vops/> where they actually take effect.
#           B-3: SecRuleEngine Off annotated with rationale comment.
# =============================

<VirtualHost *:443>
    ServerName example.com
    ServerAlias www.example.com
    ServerAlias example.org
    ServerAlias www.example.org
    ServerAdmin admin@example.com

    DocumentRoot /var/www/html
    DirectoryIndex index.php index.html

    # --- SSL & HTTP2 ---
    Protocols h2 http/1.1
    SSLEngine on
    SSLCertificateFile  /etc/letsencrypt/live/example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # --- Baseline hardening include ---
    IncludeOptional conf-available/security.conf

    # --- Security Headers (WP-safe defaults) ---
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "no-referrer-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(), microphone=()"
        Header unset X-Powered-By
    </IfModule>

    # NOTE: CSP removed intentionally — WordPress plugins/CDNs require per-page tuning.

    # --- Compression (WordPress + API responses; NOT text/event-stream to preserve SSE streaming) ---
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css application/json application/javascript

    # --- Prevent double-compression of already-encoded upstream responses (e.g. from Go SSE) ---
    SetEnvIfNoCase Content-Encoding .+ no-gzip dont-vary

    # --- Filesystem defaults ---
    <Directory />
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # [FIX-2] REMOVED: dead <Location /assets> block.
    # Options and AllowOverride are <Directory>-only directives; they have no effect inside
    # <Location>. WordPress's .htaccess already handles /assets/ access under /var/www/html.

    # --- Restrict /dev on the main site ---
    <LocationMatch "^/dev(?:/|$)">
        <RequireAny>
	    Require ip 203.0.113.10  # replace with your admin/office IP
            Require ip 203.0.113.20  # replace with a second trusted admin IP
            Require local
        </RequireAny>
    </LocationMatch>

    # [FIX-1] Redirect bare /vops to /vops/ so the ProxyPass Location block matches.
    # Without this, GET /vops (no trailing slash) falls through to WordPress, not the Go server.
    RewriteEngine On
    RewriteRule ^/vops$ /vops/ [R=301,L]

    # --- vOps SPA proxy (IP-restricted, sub-path mode) ---
    # Go server receives requests at / (prefix stripped by Apache).
    # base_path="/vops" in vops.toml tells Go to redirect/link to /vops/* paths.
    # X-Forwarded-Prefix is forwarded for future use (e.g. logging, URL rewriting).
    # [FIX-3] CacheDisable prevents mod_cache from caching authenticated proxy responses.
    #         Without this, CacheEnable disk / in cache.conf would cache /vops/ responses
    #         and CacheQuickHandler would bypass the IP Require check — a security hole.
    # [FIX-7/B-2] Removed dead <Proxy 'https://example.com/vops/?'> block — that URL did not
    #         match the actual backend http://127.0.0.1:8889/ so ProxyPreserveHost On and
    #         flushpackets were no-ops. Both directives moved into <Location /vops/> below.

    # [FIX-6] WebSocket endpoints — must use ws:// scheme explicitly.
    # mod_proxy_wstunnel is loaded but only activates when the ProxyPass URI uses ws://.
    # These more-specific Location blocks take precedence over <Location /vops/> below.

    # --- WebSocket: vOps VM shell (fleet VMs via ProxyJump) ---
    <Location /vops/api/v1/fleet/vmshell>
        H2Upgrade off
        ProxyPreserveHost On
        ProxyPass        ws://127.0.0.1:8889/api/v1/fleet/vmshell retry=0 timeout=600
        ProxyPassReverse ws://127.0.0.1:8889/api/v1/fleet/vmshell
        Require ip 203.0.113.10  # replace with your admin/office IP
        Require ip 203.0.113.20  # replace with a second trusted admin IP
    </Location>

    # --- WebSocket: vOps hypervisor shell ---
    <Location /vops/api/v1/vm/shell>
        H2Upgrade off
        ProxyPreserveHost On
        ProxyPass        ws://127.0.0.1:8889/api/v1/vm/shell retry=0 timeout=600
        ProxyPassReverse ws://127.0.0.1:8889/api/v1/vm/shell
        Require ip 203.0.113.10  # replace with your admin/office IP
        Require ip 203.0.113.20  # replace with a second trusted admin IP
    </Location>

    <Location /vops/>
        RequestHeader set X-Forwarded-Prefix "/vops"
        ProxyPreserveHost On
        CacheDisable On
        Require ip 203.0.113.10  # replace with your admin/office IP
        Require ip 203.0.113.20  # replace with a second trusted admin IP
        ProxyPass        http://127.0.0.1:8889/ timeout=300 flushpackets=on
        ProxyPassReverse http://127.0.0.1:8889/
        <IfModule security2_module>
            # ModSecurity disabled: SSE/WS streams trigger false positives; Go handles input validation.
            SecRuleEngine Off
        </IfModule>
    </Location>

    # --- Block common webapp bait paths ---
    <LocationMatch "(?i)^/(?:vendor|node_modules|src|static|prod|website|_backup|_old|backup|backups|conf|config|private|secrets)(?:/|$)">
        Require all denied
    </LocationMatch>

    # --- Block WordPress probes ---
    <LocationMatch "(?i)^/(?:wp-admin|wp-login\.php|xmlrpc\.php)(?:/|$)">
        Require all denied
    </LocationMatch>

    # --- Logging ---
    ErrorLog ${APACHE_LOG_DIR}/site.error.log
    CustomLog ${APACHE_LOG_DIR}/site.access.log vhost_combined

    # --- Block dotfiles + sensitive patterns ---
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <FilesMatch "(?i)(^\.ht|\.env|\.git)">
        Require all denied
    </FilesMatch>
</VirtualHost>
